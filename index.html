<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:350px;
padding:40px 30px;
background:white;
border-radius:12px;

/* box shadow 4 sides */
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* button style */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056d2;
}

#error{
color:red;
margin-top:10px;
font-size:14px;
text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login Form</h2>

<form id="loginform">

<input type="text" id="userName" placeholder="Enter Username">

<input type="password" id="userPasword" placeholder="Enter Password">

<button type="submit">Login</button>

<p id="error"></p>

</form>

</div>

<script src="login.js"></script>
</body>
</html>
