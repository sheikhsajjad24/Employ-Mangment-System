<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employ Management System</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body{
           
            /* background-color: rgb(201, 201, 201); */
      background: #f5f5f5;

            padding: 2% 4%;

        }
        h1{
            font-size: 24px;
            padding: 20px 0px;
            
        }
        form{
            background-color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);

            padding: 30px 0px;
            border-radius: 14px;
        }
        input{
            margin: 15px;
            padding: 10px 20px;
            text-transform: capitalize;
        }
        .save{
             padding: 10px 20px;
        }
        .save button{
               padding: 8px 18px;
               font-size: 15px; 
               background-color: green;
               color: white;
               border-radius: 10px;
               border: 1px solid black;  
 
 .table-container{
  width:100%;
  overflow-x:auto;
}           }
   table{
  width:100%;
  min-width:700px;
  margin:26px 0;
  border-collapse:collapse;
  background:white;
}

      th, td {
        text-transform: capitalize;
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
     
    }
    th {
      background: #eee;
    }
     button {
      padding: 6px 12px;
      margin: 4px;
      margin-left: 3px;
    
      border-radius: 5px;
      cursor: pointer;
    }
    .editBtn {
      background: #ffc107;
    }
    .deleteBtn {
      background: #f44336;
      color: white;
    }
    @media (max-width:768px){

  body{
    padding: 10px;
  }
 

  h1{
    font-size:20px;
  }

  form{
    flex-direction: column;
    padding:20px;
  }

  input{
    width:100%;
    margin:8px 0;
  }

  .save{
    margin-top:10px;
  }

  table{
    font-size:14px;
  }

  th,td{
    padding:8px;
  }

}
    </style>
</head>
<body>
    <div class="main">
        <h1>Employ Management System</h1>
        <form action="#"  id="forminp">
            <input type="number" name="idd" id="emId" placeholder="Employe id"">
            <input type="text" name="fName" id="firstName" placeholder="first name">
            <input type="text" name="lName" id="lastName" placeholder="last name">
            <input type="email" name="email" id="emEmail" placeholder="email">
             <input type="date" name="date" id="emdate">
            <input type="number" name="phonenumber" id="phoneNumber" placeholder="phone number">
     
            <!-- save button -->
             <div class="save">
                <button id="sbtn">Save</button>
             </div>
        </form>
        <!-- table data -->
        <table class="table-container">
            <thead id="tHead">
                <tr>
                    <th>ID</th>
                    <th>first name</th>
                    <th>last name</th>
                    <th>email</th>
                    <th>date</th>
                    <th>phone number</th>
                    <th>option </th>

                </tr>
            </thead>
            <tbody id="tbdy">
                 
            </tbody>
        </table>
    </div>
</body>
<script src="log.js"></script>
</html>
